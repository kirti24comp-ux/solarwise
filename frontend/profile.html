<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - SolarWise</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">🌞 SolarWise</div>
            <ul class="nav-links" id="navLinks">
                <!-- Will be populated by JavaScript -->
            </ul>
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-sidebar">
            <div class="user-info">
                <div class="user-avatar">👤</div>
                <h3 id="userName">Loading...</h3>
                <p id="userEmail"></p>
                <p id="memberSince"></p>
                <button id="logoutBtn" class="btn-secondary" style="margin-top: 1rem;">Logout</button>
            </div>
        </div>
        
        <div class="profile-content">
            <h2>My Solar Assessments</h2>
            <div id="assessmentsList" class="assessments-list">
                <p>Loading your assessments...</p>
            </div>
            
            <div style="margin-top: 2rem; text-align: center;">
                <a href="assessment.html" class="cta-button">New Assessment →</a>
            </div>
        </div>
    </div>

    <style>
        .profile-container {
            max-width: 1200px;
            margin: 2rem auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            padding: 0 20px;
        }
        
        .profile-sidebar {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            padding: 2rem;
            height: fit-content;
        }
        
        .user-info {
            text-align: center;
        }
        
        .user-avatar {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .user-info h3 {
            margin-bottom: 0.5rem;
        }
        
        .user-info p {
            color: #666;
            margin-bottom: 0.5rem;
        }
        
        .profile-content {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            padding: 2rem;
        }
        
        .assessments-list {
            margin-top: 1rem;
        }
        
        .assessment-card {
            background: #f9f9f9;
            border-left: 4px solid #FF6B35;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-radius: 5px;
        }
        
        .assessment-card h4 {
            margin-bottom: 0.5rem;
            color: #FF6B35;
        }
        
        .assessment-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .assessment-detail {
            font-size: 0.9rem;
        }
        
        .assessment-detail strong {
            display: block;
            color: #666;
        }
        
        .no-assessments {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
        
        .btn-secondary {
            background: #4ECDC4;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        
        .btn-secondary:hover {
            background: #45b7aa;
        }
        
        @media (max-width: 768px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <script src="js/auth.js"></script>
</body>
</html>
