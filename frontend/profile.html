<!-- Add this section to profile.html -->
<div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid #ddd;">
    <h3 style="color: #c62828;">Danger Zone</h3>
    <p style="color: #666; margin-bottom: 1rem;">Once you delete your account, there is no going back. All your assessments will be permanently deleted.</p>
    <button id="deleteAccountBtn" class="delete-account-btn">Delete My Account</button>
</div>

<style>
.delete-account-btn {
    background: #c62828;
    color: white;
    border: none;
    padding: 0.8rem 1.5rem;
    border-radius: 5px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.3s;
}

.delete-account-btn:hover {
    background: #b71c1c;
}
</style>

<script>
// Add to your existing auth.js
document.getElementById('deleteAccountBtn')?.addEventListener('click', async () => {
    if (confirm('⚠️ WARNING: This will permanently delete your account and all your assessments. This action cannot be undone. Are you sure?')) {
        if (confirm('Type "DELETE" to confirm account deletion:')) {
            const confirmation = prompt('Type DELETE to confirm:');
            if (confirmation === 'DELETE') {
                try {
                    const response = await fetch('http://localhost:5000/api/delete-account', {
                        method: 'DELETE',
                        credentials: 'include'
                    });
                    const data = await response.json();
                    if (data.success) {
                        alert('Account deleted successfully');
                        sessionStorage.removeItem('user');
                        window.location.href = 'index.html';
                    } else {
                        alert('Error deleting account: ' + data.error);
                    }
                } catch (error) {
                    alert('Error deleting account. Please try again.');
                }
            }
        }
    }
});
</script>
